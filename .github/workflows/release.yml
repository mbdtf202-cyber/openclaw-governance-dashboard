name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Check OpenClaw patch applicability
        run: bash scripts/check-openclaw-patch.sh

      - name: Package release artifacts
        run: bash scripts/release-plugin.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: governance-dashboard
          path: |
            dist/*

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tgz
            dist/*.sha256
            dist/release.README.md
            integrations/openclaw-core/openclaw-governance-dashboard.patch
          body_path: dist/release.README.md
